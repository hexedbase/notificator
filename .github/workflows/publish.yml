name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: github-packages
    permissions:
      contents: read
      packages: write

    env:
      UV_PUBLISH_URL: https://pip.pkg.github.com/${{ github.repository_owner }}/
      UV_PUBLISH_USERNAME: ${{ github.actor }}
      UV_PUBLISH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish package
        run: |
          uv build
          uv publish
